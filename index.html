<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poem generator</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to my poem generator!</h1>
      </header>
      <main>
        <form action="">
          <input
            type="text"
            id=""
            class="instructions"
            autofocus
            required
            autocomplete="off"
            placeholder="Enter the topic for poem"
          />
          <input type="submit" class="button" />
        </form>
        <div class="poem">
          The poem will go here..
          <br />
          The poem will continue here..
        </div>
      </main>
    </div>
  </body>
  <footer>
    <script src="src/index.js"></script>
    This AI project was coded by
    <a href="https://github.com/Gabcii">Gabriella Derzsi</a>, open-sourced on
    <a href="https://github.com/Gabcii/poem-generator">Github </a>and hosted on
    <a href="https://best-poem-generator.netlify.app/">Netlify.</a>
  </footer>
</html>
